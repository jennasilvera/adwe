name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: adwe
          POSTGRES_PASSWORD: adwe
          POSTGRES_DB: adwe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adwe -d adwe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: PYTHONPATH=src uv run pytest
