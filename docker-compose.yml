services:

  api:
    build: .
    container_name: adwe-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://adwe:adwe@postgres:5432/adwe
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: adwe-postgres
    environment:
      POSTGRES_USER: adwe
      POSTGRES_PASSWORD: adwe
      POSTGRES_DB: adwe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: adwe-redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: adwe-worker
    command: uv run arq adwe.workers.arq_worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://adwe:adwe@postgres:5432/adwe
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
